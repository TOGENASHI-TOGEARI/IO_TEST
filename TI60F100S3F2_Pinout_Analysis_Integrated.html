<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芯片引脚分析平台</title>
<style>
:root {
  --bg: #faf7f5; --card: #ffffff; --text: #1a1a1a; --text2: #5a5a5a;
  --accent: #eb5600; --accent-light: #fff3ec; --border: #e8e0db;
  --header-bg: #2d2d2d; --header-text: #ffffff;
  --bank-bl: #4a90d9; --bank-1a: #27ae60; --bank-1b: #2ecc71;
  --bank-2a: #e67e22; --bank-3a: #e74c3c; --bank-3b: #c0392b;
  --bank-4a: #9b59b6;
  --tag-jtag: #7b1fa2; --tag-config: #00838f; --tag-mipi: #d84315;
  --tag-clk: #1565c0; --tag-pll: #2e7d32; --tag-vref: #f9a825;
  --tag-ddio: #5d4037; --tag-ref: #546e7a; --tag-power: #37474f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,'Segoe UI','Microsoft YaHei',sans-serif;
  background:var(--bg); color:var(--text); line-height:1.7; padding:20px;
}
.container { max-width:1200px; margin:0 auto; }

/* 标题 + 芯片切换 */
.header-row {
  display:flex; flex-wrap:wrap; align-items:center; gap:16px; margin-bottom:8px;
}
h1 { font-size:1.8em; font-weight:800; letter-spacing:-0.5px; }
.subtitle { color:var(--text2); font-size:1em; margin-bottom:20px; }
.chip-selector {
  display:flex; align-items:center; gap:8px; margin-left:auto;
}
.chip-selector select {
  padding:6px 12px; border-radius:8px; border:1.5px solid var(--border);
  font-size:0.88em; background:var(--card); cursor:pointer; color:var(--text);
}
.chip-selector select:focus { border-color:var(--accent); outline:none; }
.chip-selector label { font-size:0.82em; color:var(--text2); font-weight:500; }

/* 元信息条 */
.meta-bar {
  display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px;
  padding:14px 20px; background:var(--card); border-radius:12px;
  border:1px solid var(--border);
}
.meta-item { display:flex; align-items:center; gap:5px; font-size:0.88em; }
.meta-label { color:var(--text2); }
.meta-value { font-weight:600; }

/* 统计网格 */
.stat-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px; margin-bottom:20px;
}
.stat-box { padding:12px 14px; border-radius:8px; text-align:center; border:1px solid var(--border); }
.stat-box .num { font-size:1.6em; font-weight:800; line-height:1.2; }
.stat-box .label { font-size:0.75em; color:var(--text2); margin-top:2px; }

/* 标签页 */
.tab-bar {
  display:flex; gap:4px; margin-bottom:0; background:var(--card);
  border-radius:12px 12px 0 0; border:1px solid var(--border);
  border-bottom:none; padding:10px 14px 0; overflow-x:auto;
}
.tab-btn {
  padding:10px 22px; border-radius:8px 8px 0 0; cursor:pointer;
  font-size:0.9em; font-weight:600; border:1.5px solid transparent;
  background:transparent; color:var(--text2); user-select:none;
  transition:all 0.15s; white-space:nowrap;
}
.tab-btn:hover { color:var(--accent); background:var(--accent-light); }
.tab-btn.active {
  color:var(--accent); background:var(--card); border-color:var(--border) var(--border) var(--card);
  border-bottom:2px solid var(--card); margin-bottom:-1px;
}
.tab-content { display:none; }
.tab-content.active { display:block; }

/* 卡片 */
.card {
  background:var(--card); border-radius:12px; border:1px solid var(--border);
  margin-bottom:24px; overflow:hidden;
}
.card-header {
  padding:14px 22px; background:var(--header-bg); color:var(--header-text);
  font-size:1.1em; font-weight:700; display:flex; align-items:center; gap:10px;
}
.card-body { padding:18px 22px; }

/* ===== BGA 视图 ===== */
.bga-layout { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
.bga-controls { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
.bga-btn {
  padding:4px 12px; border-radius:5px; font-size:0.8em; font-weight:600;
  cursor:pointer; border:1.5px solid var(--border); background:var(--card);
  color:var(--text); transition:all 0.12s; user-select:none;
}
.bga-btn:hover { border-color:var(--accent); }
.bga-btn.active { color:#fff; border-color:currentColor; }
.bga-btn.all-btn.active { background:var(--text); border-color:var(--text); color:#fff; }
.bga-container {
  width:100%; padding:10px;
  background:#fcf9f7; border-radius:10px; border:1px solid #f0e8e2;
  user-select:none; box-sizing:border-box; position:relative;
}
.bga-svg {
  display:block; width:100%; height:auto;
  cursor:grab; background:#fcf9f7;
  border-radius:4px;
}
.bga-svg:active { cursor:grabbing; }
.bga-label-row { font-size:14px; fill:#5a5a5a; font-weight:600; font-family:'Consolas',monospace; text-anchor:end; dominant-baseline:central; }
.bga-label-col { font-size:14px; fill:#5a5a5a; font-weight:600; font-family:'Consolas',monospace; text-anchor:middle; }
.bga-zoom-bar {
  display:flex; align-items:center; gap:6px;
  padding:6px 16px; background:var(--card); border-radius:20px;
  border:1px solid var(--border); font-size:0.8em;
}
.bga-zoom-btn {
  width:30px; height:30px; border-radius:50%; border:1px solid var(--border);
  background:var(--card); color:var(--text); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1.05em; font-weight:700; transition:all 0.12s; line-height:1;
}
.bga-zoom-btn:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.bga-zoom-level { min-width:44px; text-align:center; color:var(--text2); font-weight:600; font-size:0.9em; }
.bga-ball { cursor:pointer; transition:opacity 0.12s; }
.bga-ball:hover { filter:brightness(1.3) drop-shadow(0 0 4px rgba(0,0,0,0.25)); }
.bga-ball.dimmed { opacity:0.15; }
.bga-ball.selected { stroke:#fff; stroke-width:2.5; filter:drop-shadow(0 0 6px rgba(0,0,0,0.5)); }
.bga-tooltip {
  position:absolute; pointer-events:none; z-index:100;
  background:#fff; border:1px solid var(--border); border-radius:8px;
  padding:8px 12px; font-size:0.8em; box-shadow:0 4px 16px rgba(0,0,0,0.12);
  max-width:260px; opacity:0; transition:opacity 0.12s;
}
.bga-tooltip.show { opacity:1; }
.bga-tooltip .tip-name { font-weight:700; font-size:1em; margin-bottom:3px; }
.bga-tooltip .tip-row { display:flex; justify-content:space-between; gap:8px; margin:1px 0; }
.bga-tooltip .tip-label { color:var(--text2); }
.bga-tooltip .tip-func { color:var(--accent); font-size:0.88em; margin-top:3px; }
.bga-legend { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.bga-legend-item { display:flex; align-items:center; gap:4px; font-size:0.75em; }

/* ===== 引脚表 ===== */
.filter-row {
  display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px;
}
.filter-btns { display:flex; flex-wrap:wrap; gap:6px; flex-shrink:0; }
.filter-btn {
  padding:5px 14px; border-radius:6px; font-size:0.82em; font-weight:600;
  cursor:pointer; background:var(--card); color:var(--text);
  border:1.5px solid var(--border); user-select:none; transition:all 0.15s;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.search-box {
  flex:1; min-width:160px; max-width:300px; padding:7px 12px; border-radius:6px;
  border:1.5px solid var(--border); font-size:0.85em; outline:none;
  background:#fff; color:var(--text); margin-left:auto;
}
.search-box:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(235,86,0,0.1); }
.result-count { font-size:0.82em; color:var(--text2); margin-top:6px; }
.result-count .num { font-weight:700; color:var(--accent); }
.scroll-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.85em; }
th { background:#f5f0ed; padding:8px 10px; text-align:left; font-weight:700; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:1; }
td { padding:6px 10px; border-bottom:1px solid #f0ebe7; vertical-align:top; }
tr:hover td { background:#fdf9f6; }
.pin-code { font-family:'Consolas','Courier New',monospace; font-weight:600; }
.ftag {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:0.76em; font-weight:600; white-space:nowrap; margin-right:3px;
}
.ftag-jtag   { background:#ede7f6; color:#7b1fa2; }
.ftag-config { background:#e0f2f1; color:#00838f; }
.ftag-gpio   { background:#e8f5e9; color:#2e7d32; }
.ftag-mipi   { background:#fbe9e7; color:#d84315; }
.ftag-clk    { background:#e3f2fd; color:#1565c0; }
.ftag-power  { background:#fce4ec; color:#c2185b; }
.ftag-gnd    { background:#eceff1; color:#455a64; }
.ftag-ref    { background:#fff3e0; color:#ef6c00; }
.btag {
  display:inline-block; padding:1px 7px; border-radius:3px;
  font-size:0.72em; font-weight:700; color:#fff; white-space:nowrap;
}
.pin-row-hidden { display:none !important; }

/* ===== 分析内容 ===== */
.section-intro { font-size:0.92em; color:var(--text2); margin-bottom:14px; line-height:1.8; }
.section-intro strong { color:var(--text); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:768px){ .grid-2{grid-template-columns:1fr;} body{padding:12px} }
.naming-rule {
  background:#f5f0ed; border-radius:8px; padding:14px 18px;
  font-family:'Consolas',monospace; font-size:0.88em; margin:10px 0;
  border-left:4px solid var(--accent);
}
.naming-rule .highlight { color:var(--accent); font-weight:700; }
.note-box {
  background:var(--accent-light); border-radius:8px; padding:12px 16px;
  border-left:4px solid var(--accent); margin:10px 0; font-size:0.9em;
}
.note-box strong { color:var(--accent); }
h3.sec-title { font-size:1em; margin:16px 0 8px; padding-bottom:3px; border-bottom:2px solid var(--border); }
.sub-section { font-weight:700; font-size:0.95em; margin:14px 0 6px; }
.bank-legend { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
.bank-legend-item { display:flex; align-items:center; gap:4px; font-size:0.82em; }
.bank-dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
.tag {
  display:inline-block; padding:1px 7px; border-radius:3px;
  font-size:0.72em; font-weight:600; color:#fff; margin:1px;
}
.tag-jtag { background:var(--tag-jtag); }
.tag-config { background:var(--tag-config); }
.tag-mipi { background:var(--tag-mipi); }
.tag-clk { background:var(--tag-clk); }
.tag-pll { background:var(--tag-pll); }
.tag-vref { background:var(--tag-vref); color:#333; }
.tag-ref { background:var(--tag-ref); }
.tag-power { background:var(--tag-power); }
.tag-bank { background:var(--accent); }
.chapter-num {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:26px; border-radius:50%;
  background:var(--accent); color:#fff; font-weight:700;
  font-size:0.82em; margin-right:5px; flex-shrink:0;
}
.footer { text-align:center; padding:20px; color:var(--text2); font-size:0.82em; border-top:1px solid var(--border); margin-top:24px; }

/* ===== JSON 加载区 ===== */
.load-zone {
  border:2px dashed var(--border); border-radius:10px; padding:30px;
  text-align:center; margin:20px 0; color:var(--text2);
  transition:all 0.2s; cursor:pointer;
}
.load-zone:hover { border-color:var(--accent); background:var(--accent-light); }
.load-zone input { display:none; }
</style>
</head>
<body>
<div class="container">
  <!-- 标题 + 芯片选择 -->
  <div class="header-row">
    <h1 id="chipTitle">TI60F100S3F2 引脚系统详细解析</h1>
    <div class="chip-selector">
      <label for="chipSelect">芯片切换</label>
      <select id="chipSelect">
        <option value="ti60f100s3f2" selected>TI60F100S3F2 (FBGA100)</option>
        <option value="__load__">📂 加载自定义 JSON...</option>
      </select>
    </div>
  </div>
  <p class="subtitle" id="chipSubtitle">Efinix Titanium FPGA · FBGA100 封装 · Pinout v1.1</p>

  <!-- Meta -->
  <div class="meta-bar" id="metaBar"></div>

  <!-- Statistics -->
  <div class="stat-grid" id="statGrid"></div>

  <!-- Tabs -->
  <div style="background:var(--card);border-radius:12px 12px 0 0;border:1px solid var(--border);border-bottom:none;">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="bga">🧩 BGA 视图</button>
      <button class="tab-btn" data-tab="pintable">📋 引脚表</button>
      <button class="tab-btn" data-tab="analysis">📖 详细分析</button>
    </div>
  </div>

  <!-- Tab: BGA -->
  <div class="card tab-content active" id="tab-bga" style="border-radius:0 0 12px 12px;border-top:none;margin-top:0;">
    <div class="card-body">
      <p class="section-intro" id="bgaIntro">FBGA100 封装 <strong>10×10 球栅</strong>可视化。悬停查看详情，点击跳转引脚表。</p>
      <div class="bga-layout">
        <div class="bga-controls" id="bgaControls"></div>
        <div class="bga-container">
          <svg class="bga-svg" id="bgaSvg" viewBox="0 0 700 500"></svg>
          <div class="bga-tooltip" id="bgaTooltip"></div>
        </div>
        <div class="bga-zoom-bar">
          <button class="bga-zoom-btn" id="zoomOut" title="缩小">−</button>
          <span class="bga-zoom-level" id="zoomLevel">100%</span>
          <button class="bga-zoom-btn" id="zoomIn" title="放大">+</button>
          <button class="bga-zoom-btn" id="zoomReset" title="重置" style="font-size:0.8em;">⟲</button>
          <span style="color:var(--text2);margin-left:6px;font-size:0.9em;">滚轮缩放 · 拖拽平移</span>
        </div>
        <div class="bga-legend" id="bgaLegend"></div>
      </div>
    </div>
  </div>

  <!-- Tab: 引脚表 -->
  <div class="card tab-content" id="tab-pintable" style="border-radius:0 0 12px 12px;border-top:none;margin-top:0;">
    <div class="card-body">
      <div class="filter-row">
        <div class="filter-btns" id="filterBtns"></div>
        <input type="text" class="search-box" id="pinSearch" placeholder="搜索引脚名、位置或功能...">
      </div>
      <div class="result-count" id="resultCount"></div>
      <div class="scroll-wrap">
        <table>
          <thead><tr><th>编号</th><th>位置</th><th>Bank</th><th>引脚名称</th><th>功能类型</th><th>说明</th></tr></thead>
          <tbody id="pinTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab: 分析 -->
  <div class="card tab-content" id="tab-analysis" style="border-radius:0 0 12px 12px;border-top:none;margin-top:0;">
    <div class="card-body" id="analysisContent"></div>
  </div>

  <!-- Json 上传 -->
  <div class="load-zone" id="loadZone">
    📂 拖放或点击上传芯片 JSON 文件 (.json)<br>
    <small style="color:var(--text2)">支持任意芯片的引脚数据，需遵循 CHIP_DATA 格式</small>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <div class="footer" id="footer">芯片引脚分析平台 v2.0 · 数据驱动</div>
</div>

<script>
// ============================================================
// CHIP_DATA 格式定义 — 一套 JSON 就驱动全部界面
// ============================================================
// 字段说明：
//   meta:       芯片元信息 {model, manufacturer, family, description, version}
//   package:    封装信息 {type, pin_count, body_width, body_height, bga_rows[], bga_cols}
//   summary:    统计摘要 {jtag, config, mipi, clk_pairs, pll_inputs, ddio, ref_res, power_gnd}
//   banks[]:   Bank 列表 [{id, name, pin_count, vccio_pin, voltage, functions, clock_domain, color}]
//   pins[]:    引脚数组 [{number, name, bga_ball, bank, type, cat, functions[], description}]
//   naming_rule: 命名规则 {pattern, parts[{field, meaning, example}], example, note}
//   jtag:      JTAG 描述 {description, pins[{name, ball, dir, desc}], note}
//   config_pins: 配置引脚 [{signal, ball, bank, alt_pin, desc}]
//   mipi_channels[]: MIPI通道 [{id, name, color, description, pairs[{pair, p_pin, n_pin, p_ball, n_ball, func, domain}]}]
//   lvds_pairs: 非MIPI LVDS对 [{pair, p_pin, n_pin, p_ball, n_ball, special, domain}]
//   clocks:    时钟 {differential: [{name, p_ball, n_ball, domain, mipi_func}], pll_inputs:[...], extfb:[...], note}
//   power:     电源 {core:[], analog:[], aux:[], io:[], gnd:[], vref:[], note}
//   pcb:       PCB设计 {power_decoupling:[], diff_pair_routing:[], config_circuit:[], ref_res_notes:[]}
//   ref_res:   参考引脚 [{name, ball, bank, desc}]

// ============================================================
// TI60F100S3F2 数据
// ============================================================
var DATA = {
  meta: {
    model: "TI60F100S3F2", manufacturer: "Efinix", family: "Ti60",
    description: "Ti60 FPGAs, 60K logic elements, 2.5Mb BRAM, 2 MIPI RX, 2 PLL, FBGA100 package",
    version: "v0.7 (2024-05-17)"
  },
  package: {
    type: "FBGA100", pin_count: 100, body_width: 9, body_height: 9,
    bga_rows: ["A","B","C","D","E","F","G","H","J","K"], bga_cols: 10,
    package_type: "bga"
  },
  summary: {
    jtag: 4, config: 11, mipi: 48, clk_pairs: 8, pll_inputs: 3,
    ddio: 57, ref_res: 6, power_gnd: 27
  },
  banks: [
    {id:"BL",  name:"BL",    pin_count:4,  vccio_pin:"VCCIO33_BL (J3)", voltage:"固定 3.3V",           functions:"JTAG 调试专用", clock:"—"},
    {id:"1A",  name:"BANK1A",pin_count:15, vccio_pin:"VCCIO1A_4B (G2)", voltage:"1.8 / 2.5 / 3.3V",   functions:"配置接口 + MIPI I1 (数据0~3) + CLK0/1", clock:"L0~L3"},
    {id:"1B",  name:"BANK1B",pin_count:17, vccio_pin:"VCCIO1B (D3)",   voltage:"1.8 / 2.5 / 3.3V",   functions:"MIPI I1 (数据4~7+CLK) + CLK2/3 + PLL + EXTFB", clock:"L4~L7"},
    {id:"2A",  name:"BANK2A",pin_count:2,  vccio_pin:"VCCIO2A_2B (A6)", voltage:"1.8 / 2.5 / 3.3V",   functions:"REF_RES + 单个 GPIO (Top侧)", clock:"T0"},
    {id:"3A",  name:"BANK3A",pin_count:13, vccio_pin:"VCCIO3A (C9)",   voltage:"1.8 / 2.5 / 3.3V",   functions:"MIPI I7 (数据4~7+CLK) + CLK8/9 + PLL", clock:"R4~R7"},
    {id:"3B",  name:"BANK3B",pin_count:21, vccio_pin:"VCCIO3B_4A (G9)", voltage:"1.8 / 2.5 / 3.3V",   functions:"MIPI I7(数据0~3) + I6(数据0~4+CLK) + CLK10/11 + PLL + EXTFB", clock:"R0~R3"},
    {id:"4A",  name:"BANK4A",pin_count:1,  vccio_pin:"VCCIO3B_4A (G9)", voltage:"与3B共享",           functions:"REF_RES 仅1个引脚", clock:"—"}
  ],
  pins: [
    {n:1,ball:"K5",name:"TDI",bank:"BL",type:"jtag",cat:"jtag",desc:"JTAG 数据输入，用于边界扫描和调试"},
    {n:2,ball:"K3",name:"TCK",bank:"BL",type:"jtag",cat:"jtag",desc:"JTAG 时钟，边界扫描测试时钟"},
    {n:3,ball:"K4",name:"TMS",bank:"BL",type:"jtag",cat:"jtag",desc:"JTAG 模式选择，控制TAP状态机"},
    {n:4,ball:"J4",name:"TDO",bank:"BL",type:"jtag",cat:"jtag",desc:"JTAG 数据输出，读取扫描结果"},
    {n:5,ball:"H4",name:"REF_RES_1A",bank:"1A",type:"ref",cat:"ref",desc:"参考/保留引脚，Bank 1A，须按规格书要求连接"},
    {n:6,ball:"H3",name:"CDONE",bank:"1A",type:"config",cat:"config",desc:"配置完成状态，高电平表示FPGA配置成功"},
    {n:7,ball:"K1",name:"CRESET_N",bank:"1A",type:"config",cat:"config",desc:"配置复位（低电平有效），重新启动配置过程"},
    {n:8,ball:"J1",name:"GPIOL_P_01_SSL_N",bank:"1A",type:"gpio",cat:"config",desc:"GPIO或SSL_N（SPI从机片选，低有效）"},

  naming_rule: {
    pattern: "<span class='highlight'>GPIO</span>_<span class='highlight'>L/R/T/B</span>_<span class='highlight'>P/N</span>_<span class='highlight'>NN</span>_[功能后缀]",
    example: "GPIOL_P_07_CLK0_P → 左侧, 差分正端, 07号, CLK0时钟正端",
    note: "该引脚同时复用为 MIPI RX 数据线和专用时钟输入。",
    parts: [
      {field:"L / R / T / B", meaning:"引脚在芯片四边的物理位置", example:"L=Left(左), R=Right(右), T=Top(顶), B=Bottom(底)"},
      {field:"P / N", meaning:"差分对极性", example:"P=Positive(正端), N=Negative(负端)"},
      {field:"NN", meaning:"Bank 内引脚编号", example:"00~19（两位数字）"},
      {field:"CLKx_P/N", meaning:"专用差分时钟输入", example:"CLK0~CLK11"},
      {field:"PLLIN0", meaning:"PLL 参考时钟输入", example:"3处分布（BANK1B/3A/3B各1）"},
      {field:"EXTFB", meaning:"外部反馈输入", example:"2处（BANK1B/3B各1）"},
      {field:"SSL_N/CCK/CDI", meaning:"SPI 配置接口信号", example:"从机片选/时钟/数据线"},
      {field:"CBSEL0/1", meaning:"配置总线宽度选择", example:"1-bit / 2-bit / 4-bit SPI"}
    ]
  },

// ===== BGA 可视化（SVG 原生 transform） =====
var bgaZ = { level:1, tx:0, ty:0 };

function renderBGA(d) {
  var rows = d.package.bga_rows, cols = d.package.bga_cols;
  var CELL = 68, RAD = 22, LABEL_W = 48, LABEL_H = 44;
  var GAP = 16;
  var gridW = cols * CELL + GAP, gridH = rows.length * CELL + GAP;
  var W = LABEL_W + gridW + 20, H = LABEL_H + gridH + 20;
  var ox = LABEL_W + 6, oy = LABEL_H + 6;

  var pinMap = {};
  d.pins.forEach(function(p) { pinMap[p.ball] = p; });
  bgaZ.level = 1; bgaZ.tx = 0; bgaZ.ty = 0;

  var svg = document.getElementById('bgaSvg');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.style.width = '100%';
  svg.style.height = 'auto';
  svg.style.minHeight = '400px';

  // Background rect
  svg.appendChild(makeSVG('rect', {x:0, y:0, width:W, height:H, fill:'#fcf9f7', rx:6}));

  // All zoomable content in one group
  var group = makeSVG('g', {id:'bgaGroup'});
  svg.appendChild(group);

  // Column labels
  for (var c = 0; c < cols; c++) {
    var tx = ox + c * CELL + CELL/2;
    var t = makeSVG('text', {x:tx, y:oy-10, 'class':'bga-label-col'});
    t.textContent = (c+1).toString();
    group.appendChild(t);
  }

  // Row labels and balls
  rows.forEach(function(row, ri) {
    var ry = oy + ri * CELL + CELL/2;
    var lbl = makeSVG('text', {x:ox-10, y:ry, 'class':'bga-label-row'});
    lbl.textContent = row;
    group.appendChild(lbl);

    for (var ci = 0; ci < cols; ci++) {
      var ball = row + (ci+1);
      var pin = pinMap[ball];
      if (!pin) continue;
      var cx = ox + ci * CELL + CELL/2;
      var color = BANK_COLORS[pin.bank] || '#999';
      group.appendChild(makeSVG('circle', {
        cx:cx, cy:ry, r:RAD, fill:color, stroke:darken(color), 'stroke-width':'1.5',
        class:'bga-ball', 'data-ball':ball, 'data-bank':pin.bank
      }));
    }
  });

  // Bank filter controls
  var controls = document.getElementById('bgaControls');
  controls.innerHTML = '';
  var allBtn = mkBtn('全部', function() { setBgaFilter('all'); resetBgaDim(svg); });
  allBtn.className = 'bga-btn all-btn active';
  controls.appendChild(allBtn);

  BANK_ORDER.forEach(function(bank) {
    var label = BANK_LABELS[bank];
    var cnt = d.pins.filter(function(p) { return p.bank === bank; }).length;
    if (cnt === 0) return;
    var btn = mkBtn(label + ' (' + cnt + ')', function() {
      setBgaFilter(bank);
      dimBgaByBank(svg, bank);
    });
    btn.style.setProperty('--btn-color', BANK_COLORS[bank]);
    controls.appendChild(btn);
  });

  // Legend
  var legend = document.getElementById('bgaLegend');
  legend.innerHTML = '';
  BANK_ORDER.forEach(function(bank) {
    var cnt = d.pins.filter(function(p) { return p.bank === bank; }).length;
    if (cnt === 0) return;
    var item = document.createElement('span');
    item.className = 'bga-legend-item';
    item.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + BANK_COLORS[bank] + ';flex-shrink:0"></span> ' + BANK_LABELS[bank] + ' (' + cnt + ')';
    legend.appendChild(item);
  });

  // Tooltip
  var tooltip = document.getElementById('bgaTooltip');
  svg.addEventListener('mousemove', function(evt) {
    var target = evt.target;
    if (target.tagName !== 'circle' || !target.classList.contains('bga-ball')) {
      tooltip.classList.remove('show');
      return;
    }
    var ball = target.getAttribute('data-ball');
    var pin = pinMap[ball];
    if (!pin) return;
    tooltip.innerHTML =
      '<div class="tip-name">#' + pin.n + ' ' + pin.name + '</div>' +
      '<div class="tip-row"><span class="tip-label">BGA</span><span>' + pin.ball + '</span></div>' +
      '<div class="tip-row"><span class="tip-label">Bank</span><span>' + (BANK_LABELS[pin.bank]||pin.bank) + '</span></div>';
    tooltip.classList.add('show');
    var cont = tooltip.parentElement.getBoundingClientRect();
    var x = evt.clientX - cont.left + 14, y = evt.clientY - cont.top - 12;
    // Flip to left side if too close to right edge
    if (x + 250 > cont.width) x = evt.clientX - cont.left - 260;
    // Keep within top boundary
    if (y < 4) y = 4;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  });
  svg.addEventListener('mouseleave', function() { tooltip.classList.remove('show'); });

  // Click -> pin table
  svg.addEventListener('click', function(evt) {
    var target = evt.target;
    if (target.tagName !== 'circle' || !target.classList.contains('bga-ball')) return;
    var ball = target.getAttribute('data-ball');
    var pin = pinMap[ball];
    if (!pin) return;
    switchTab('pintable');
    var trs = document.querySelectorAll('#pinTableBody tr');
    var tr = trs[pin.n - 1];
    if (tr) {
      tr.scrollIntoView({behavior:'smooth', block:'center'});
      tr.style.background = '#fff3ec';
      setTimeout(function() { tr.style.background = ''; }, 2000);
    }
  });

  // ===== Zoom via SVG group transform =====
  var drag = {ing:false, sx:0, sy:0, stx:0, sty:0};

  svg.addEventListener('wheel', function(evt) {
    evt.preventDefault();
    var rect = svg.getBoundingClientRect();
    var mx = evt.clientX - rect.left, my = evt.clientY - rect.top;
    var old = bgaZ.level;
    var delta = evt.deltaY > 0 ? -0.25 : 0.25;
    bgaZ.level = Math.max(0.2, Math.min(12, bgaZ.level + delta));
    // Keep mouse-point stable
    bgaZ.tx = mx - (mx - bgaZ.tx) * (bgaZ.level / old);
    bgaZ.ty = my - (my - bgaZ.ty) * (bgaZ.level / old);
    applyGroupTransform(group);
    updateBgaZoomUI();
  }, {passive:false});

  svg.addEventListener('mousedown', function(evt) {
    if (evt.target.tagName === 'circle') return;
    drag.ing = true; drag.sx = evt.clientX; drag.sy = evt.clientY;
    drag.stx = bgaZ.tx; drag.sty = bgaZ.ty;
  });
  document.addEventListener('mousemove', function(evt) {
    if (!drag.ing) return;
    bgaZ.tx = drag.stx + (evt.clientX - drag.sx);
    bgaZ.ty = drag.sty + (evt.clientY - drag.sy);
    applyGroupTransform(group);
  });
  document.addEventListener('mouseup', function() { drag.ing = false; });

  document.getElementById('zoomIn').onclick = function() {
    bgaZ.level = Math.min(12, bgaZ.level + 0.35);
    applyGroupTransform(group);
    updateBgaZoomUI();
  };
  document.getElementById('zoomOut').onclick = function() {
    bgaZ.level = Math.max(0.2, bgaZ.level - 0.35);
    applyGroupTransform(group);
    updateBgaZoomUI();
  };
  document.getElementById('zoomReset').onclick = function() {
    bgaZ.level = 1; bgaZ.tx = 0; bgaZ.ty = 0;
    applyGroupTransform(group);
    updateBgaZoomUI();
  };
  updateBgaZoomUI();
}

function applyGroupTransform(g) {
  g.setAttribute('transform', 'translate(' + bgaZ.tx.toFixed(1) + ',' + bgaZ.ty.toFixed(1) + ') scale(' + bgaZ.level.toFixed(4) + ')');
}

function updateBgaZoomUI() {
  document.getElementById('zoomLevel').textContent = Math.round(bgaZ.level * 100) + '%';
}
function setBgaFilter(bank) {
  var btns = document.querySelectorAll('#bgaControls .bga-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  if (bank === 'all') btns[0].classList.add('active');
  else btns.forEach(function(b) { if (b.textContent.indexOf(BANK_LABELS[bank]) >= 0) b.classList.add('active'); });
}
function resetBgaDim(svg) {
  svg.querySelectorAll('.bga-ball').forEach(function(el) { el.classList.remove('dimmed','selected'); });
}
function dimBgaByBank(svg, bank) {
  svg.querySelectorAll('.bga-ball').forEach(function(el) {
    if (el.getAttribute('data-bank') === bank) { el.classList.remove('dimmed'); el.classList.add('selected'); }
    else { el.classList.add('dimmed'); el.classList.remove('selected'); }
  });
}

function makeSVG(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}
function mkBtn(text, cb) {
  var btn = document.createElement('button');
  btn.className = 'bga-btn';
  btn.textContent = text;
  btn.addEventListener('click', cb);
  return btn;
}
function darken(hex) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.max(0,r-40)+','+Math.max(0,g-40)+','+Math.max(0,b-40)+')';
}

// ===== 引脚表 =====
function renderPinTable(d) {
  var tbody = document.getElementById('pinTableBody');
  tbody.innerHTML = '';
  var ftags = {jtag:'ftag-jtag',config:'ftag-config',gpio:'ftag-gpio',mipi:'ftag-mipi',power:'ftag-power',gnd:'ftag-gnd',ref:'ftag-ref'};
  var blockers = {BL:'btag-bl','1A':'btag-1a','1B':'btag-1b','2A':'btag-2a','3A':'btag-3a','3B':'btag-3b','4A':'btag-4a'};

  d.pins.forEach(function(p) {
    var tr = document.createElement('tr');
    tr.setAttribute('data-cat', p.cat);
    tr.setAttribute('data-search', (p.name+' '+p.ball+' '+p.desc).toUpperCase());
    var fLabel = {jtag:'JTAG',config:'配置',gpio:'GPIO',mipi:'MIPI/LVDS',power:'电源',gnd:'地',ref:'保留'}[p.type] || 'GPIO';
    // Determine all applicable ftags
    var fhtml = '<span class="ftag ' + (ftags[p.type]||'ftag-gpio') + '">' + fLabel + '</span>';
    if (p.type === 'gpio') {
      // Check if it's also mipi or clk
    }
    var bankTag = p.bank in BANK_LABELS ? '<span class="btag ' + (blockers[p.bank]||'btag-bl') + '">' + (BANK_LABELS[p.bank]||p.bank) + '</span>' : '—';
    tr.innerHTML =
      '<td>' + p.n + '</td>' +
      '<td><span class="pin-code">' + p.ball + '</span></td>' +
      '<td>' + bankTag + '</td>' +
      '<td class="pin-code">' + p.name + '</td>' +
      '<td>' + fhtml + '</td>' +
      '<td>' + p.desc + '</td>';
    tbody.appendChild(tr);
  });

  // Filter buttons
  var fb = document.getElementById('filterBtns');
  fb.innerHTML = '';
  var cats = [
    {v:'all', l:'全部'}, {v:'jtag', l:'JTAG'}, {v:'gpio', l:'GPIO'},
    {v:'config', l:'配置'}, {v:'mipi', l:'MIPI/LVDS'}, {v:'power', l:'电源'},
    {v:'gnd', l:'地'}, {v:'ref', l:'参考'}
  ];
  var currentCat = 'all';
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.v === 'all' ? ' active' : '');
    btn.textContent = c.l;
    btn.addEventListener('click', function() {
      fb.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentCat = c.v;
      doPinFilter(d);
    });
    fb.appendChild(btn);
  });

  // Search
  var search = document.getElementById('pinSearch');
  search.value = '';
  search.addEventListener('input', function() { doPinFilter(d); });

  window._pinFilter = {currentCat:currentCat};
  // Patch currentCat into closure
  fb._cat = 'all';
  var origBtns = fb.querySelectorAll('.filter-btn');
  origBtns.forEach(function(b) {
    b.addEventListener('click', function() {
      fb._cat = this.textContent === '全部' ? 'all' :
        this.textContent === 'JTAG' ? 'jtag' :
        this.textContent === 'GPIO' ? 'gpio' :
        this.textContent === '配置' ? 'config' :
        this.textContent === 'MIPI/LVDS' ? 'mipi' :
        this.textContent === '电源' ? 'power' :
        this.textContent === '地' ? 'gnd' : 'ref';
    });
  });

  doPinFilter(d);
}

function doPinFilter(d) {
  var fb = document.getElementById('filterBtns');
  var cat = fb._cat || 'all';
  var keyword = document.getElementById('pinSearch').value.trim().toUpperCase();
  var rows = document.querySelectorAll('#pinTableBody tr');
  var visible = 0;
  rows.forEach(function(row) {
    var rcat = row.getAttribute('data-cat') || '';
    var rsearch = row.getAttribute('data-search') || '';
    var catMatch = cat === 'all' || rcat.indexOf(cat) >= 0;
    var kwMatch = !keyword || rsearch.indexOf(keyword) >= 0;
    row.style.display = (catMatch && kwMatch) ? '' : 'none';
    if (catMatch && kwMatch) visible++;
  });
  document.getElementById('resultCount').innerHTML = '匹配 <span class="num">' + visible + '</span> / ' + d.package.pin_count + ' 条引脚';
}

// ===== 标签切换 =====
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.querySelector('.tab-btn[data-tab="' + tabId + '"]').classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}
document.getElementById('tabBar').addEventListener('click', function(evt) {
  var btn = evt.target.closest('.tab-btn');
  if (!btn) return;
  switchTab(btn.getAttribute('data-tab'));
});

// ===== 芯片选择 =====
document.getElementById('chipSelect').addEventListener('change', function() {
  if (this.value === '__load__') {
    document.getElementById('fileInput').click();
    this.value = 'ti60f100s3f2';
    return;
  }
  // Built-in chips - for now only TI60F100S3F2
  renderAll(DATA);
});

// ===== 文件加载 =====
document.getElementById('fileInput').addEventListener('change', function(evt) {
  var file = evt.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      validateData(data);
      renderAll(data);
      document.getElementById('chipTitle').textContent = data.meta.model + ' 引脚系统详细解析';
      document.getElementById('chipSubtitle').textContent = data.meta.manufacturer + ' ' + (data.meta.family||'') + ' · ' + data.package.type + ' 封装';
      switchTab('bga');
    } catch(err) {
      alert('JSON 解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ===== 拖放上传 =====
var loadZone = document.getElementById('loadZone');
loadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = 'var(--accent)'; this.style.background = 'var(--accent-light)'; });
loadZone.addEventListener('dragleave', function(e) { this.style.borderColor = ''; this.style.background = ''; });
loadZone.addEventListener('drop', function(e) {
  e.preventDefault();
  this.style.borderColor = '';
  this.style.background = '';
  var file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.json')) { alert('请拖放 .json 文件'); return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      validateData(data);
      renderAll(data);
    } catch(err) { alert('JSON 解析失败: ' + err.message); }
  };
  reader.readAsText(file);
});
loadZone.addEventListener('click', function() { document.getElementById('fileInput').click(); });

// ===== 数据校验 =====
function validateData(d) {
  if (!d.meta || !d.meta.model) throw new Error('缺少 meta.model');
  if (!d.package || !d.package.pin_count) throw new Error('缺少 package.pin_count');
  if (!d.pins || !d.pins.length) throw new Error('缺少 pins 数组');
  if (!d.banks || !d.banks.length) throw new Error('缺少 banks 数组');
}

// ===== 初始化 =====
renderAll(DATA);
</script>
